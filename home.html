<script>
// ── KEYN global: time-proportional chart helpers ─────────────────────────────
window.KEYN_CHART = (function() {
  const PRE_START=240, MKT_START=570, MKT_END=960, AH_END=1200;
  function frac(m){
    if(m<=PRE_START)return 0;
    if(m<=MKT_START)return .10*(m-PRE_START)/330;
    if(m<=MKT_END)  return .10+.80*(m-MKT_START)/390;
    if(m<=AH_END)   return .90+.10*(m-MKT_END)/240;
    return 1;
  }
  function parseTime(str){
    if(!str)return null;
    const am=str.match(/(\d+):(\d+)\s*(AM|PM)/i);
    if(am){let h=parseInt(am[1]),m=parseInt(am[2]);if(am[3].toUpperCase()==='PM'&&h!==12)h+=12;if(am[3].toUpperCase()==='AM'&&h===12)h=0;return h*60+m;}
    const hm=str.match(/^(\d+):(\d+)$/);
    if(hm)return parseInt(hm[1])*60+parseInt(hm[2]);
    return null;
  }
  function makeXOf(times,n,W,PL,PR){
    if(times&&times.length>=n){
      const mins=times.slice(0,n).map(parseTime);
      if(mins.every(m=>m!==null))return i=>PL+frac(mins[i])*(W-PL-PR);
    }
    return i=>PL+(n>1?(i/(n-1)):0)*(W-PL-PR);
  }
  function nearestIndex(xPx,W,PL,PR,times,n){
    const hf=Math.max(0,Math.min(1,(xPx-PL)/(W-PL-PR)));
    if(times&&times.length>=n){
      const mins=times.slice(0,n).map(parseTime);
      if(mins.every(m=>m!==null)){
        let best=0,bestD=Infinity;
        mins.forEach((m,i)=>{const d=Math.abs(frac(m)-hf);if(d<bestD){bestD=d;best=i;}});
        return best;
      }
    }
    return Math.round(Math.max(0,Math.min(n-1,hf*(n-1))));
  }
  return{frac,parseTime,makeXOf,nearestIndex};
})();

// ── KEYN global: drum digit animation ────────────────────────────────────────
window.KEYN_DRUM=(function(){
  const SPD='0.28s',EASE='cubic-bezier(0.72,0.01,0.30,1)';
  function mkCol(ch){
    const col=document.createElement('span');
    col.style.cssText='display:inline-flex;flex-direction:column;height:1em;will-change:transform;';
    '9876543210'.split('').forEach(d=>{const c=document.createElement('span');c.style.cssText='display:block;height:1em;line-height:1em;text-align:center;';c.textContent=d;col.appendChild(c);});
    setPos(col,parseInt(ch,10),true);return col;
  }
  function mkStat(ch){const s=document.createElement('span');s.style.cssText='display:inline-block;line-height:1em;';s.textContent=ch;return s;}
  function setPos(col,digit,instant){
    const y=-(9-digit);
    if(instant){const t=col.style.transition;col.style.transition='none';col.style.transform=`translateY(${y}em)`;col.offsetHeight;col.style.transition=t;}
    else{col.style.transition=`transform ${SPD} ${EASE}`;col.style.transform=`translateY(${y}em)`;}
  }
  function build(el,str){
    el.innerHTML='';el.style.display='inline-flex';el.style.overflow='hidden';
    el.style.verticalAlign='bottom';el.style.lineHeight='1em';
    el._drum=[];
    str.split('').forEach(ch=>{
      const isD=/\d/.test(ch);
      if(isD){const col=mkCol(ch);el.appendChild(col);el._drum.push({ch,el:col,isD:true});}
      else   {const s=mkStat(ch);  el.appendChild(s);  el._drum.push({ch,el:s,  isD:false});}
    });
    el.dataset.dv=str;
  }
  function tick(el,str){
    if(el.dataset.dv===str)return;
    if(!el._drum){build(el,str);return;}
    const chars=str.split('');
    const ok=chars.length===el._drum.length&&chars.every((c,i)=>/\d/.test(c)===el._drum[i].isD);
    if(!ok){build(el,str);return;}
    chars.forEach((ch,i)=>{const e=el._drum[i];if(e.ch===ch)return;e.ch=ch;if(e.isD)setPos(e.el,parseInt(ch,10),false);else e.el.textContent=ch;});
    el.dataset.dv=str;
  }
  return{tick};
})();
</script>
<script>

  (function() {

      agri: [
        { name:'Wheat',    symbol:'ZW=F',  prices:[534,536,538,540,539,541,543,542,540,541,542,540,541,541], dir:'up' },

        { name:'Soybeans', symbol:'ZS=F',  prices:[1018,1022,1025,1028,1025,1027,1030,1032,1029,1031,1032,1030,1032,1032], dir:'up' },
        { name:'Sugar',    symbol:'SB=F',  prices:[20.50,20.45,20.40,20.35,20.30,20.25,20.22,20.20,20.18,20.16,20.15,20.14,20.14,20.14], dir:'dn' },

      crypto: [
        { name:'Bitcoin',  symbol:'BTC-USD', prices:[82800,83100,83500,83900,84100,83800,84000,84200,84100,84300,84210,84180,84210,84210], dir:'up' },
        { name:'Ethereum', symbol:'ETH-USD', prices:[2090,2080,2070,2065,2060,2055,2050,2048,2045,2043,2041,2042,2041,2041], dir:'dn' },
        { name:'Solana',   symbol:'SOL-USD', prices:[123,124,125,126,125,126,127,128,127,128,128,128,128,128], dir:'up' },
        { name:'XRP',      symbol:'XRP-USD', prices:[0.498,0.500,0.502,0.505,0.504,0.506,0.508,0.510,0.509,0.511,0.512,0.511,0.512,0.512], dir:'up' },
      ],
    };

    Object.values(CATEGORIES).flat().forEach(item => { item.loading = true; });
    const liveCache = {};

    // Fetch all symbols in a category in parallel and cache results
    async function prefetchCategory(cat) {
      const items = CATEGORIES[cat];
      await Promise.allSettled(items.map(async item => {
        if (liveCache[item.symbol]) return; // already cached
        try {
          const live = await window.KeynYahoo.fetchYahooChart(item.symbol, '5m', '1d');
          if (live && live.prices.length > 1) {
            liveCache[item.symbol] = live;
            // Patch item in place so render picks up live data immediately
            item.prices = live.prices;
            item.times  = live.times;
            item.open   = live.open;
            item.dir    = live.currentPrice >= live.open ? 'up' : 'dn';
            item.loading = false;
          }
        } catch (e) {
          // Silently fall back to static data for this item
          console.warn(`[KEYN] Live data failed for ${item.symbol}:`, e.message);
        }
      }));
    }

    // Format price nicely
    function fmtPrice(val) {
      if (val >= 1000) return val.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
      if (val < 10)    return val.toFixed(3);
      return val.toFixed(2);
    }

    // Format delta
    function fmtDelta(cur, open) {
      const abs = cur - open;
      const pct = (abs / open) * 100;
      const sign = abs >= 0 ? '+' : '';
      return `${sign}$${Math.abs(abs).toFixed(2)} (${Math.abs(pct).toFixed(2)}%)`;
    }

    const PILL_POS     = [0, 10, 20, 30];
    const INACTIVE_POS = [[22,32,42],[0,32,42],[0,10,42],[0,10,20]];
    const TRI_UP = '<img src="svg/triangle-up.svg" class="tri-svg-up" alt="up" />';
    const TRI_DN = '<img src="svg/triangle-down.svg" class="tri-svg-dn" alt="down" />';

    let activeCategory  = 'metals';
    let activeItemIndex = 0;
    let activeItem      = null;   // current item data
    let hoverIndex      = null;   // currently hovered point index

    // ── Canvas drawing ──────────────────────────────────────────────────────
    function drawChart(canvas, prices, isUp, openPrice, isLoading) {
      const wrap  = canvas.parentElement;
      const W     = wrap.clientWidth;
      const H     = wrap.clientHeight;
      if (!W || !H) return;

      canvas.width  = W * devicePixelRatio;
      canvas.height = H * devicePixelRatio;
      canvas.style.width  = W + 'px';
      canvas.style.height = H + 'px';

      const ctx   = canvas.getContext('2d');
      ctx.scale(devicePixelRatio, devicePixelRatio);

      const n     = prices.length;
      // Include open in range so reference line always fits
      const allVals = openPrice != null ? [...prices, openPrice] : prices;
      const min   = Math.min(...allVals) * 0.997;
      const max   = Math.max(...allVals) * 1.003;
      const PAD_L = 4, PAD_R = 4, PAD_T = 6, PAD_B = 2;

      const xOf = window.KEYN_CHART.makeXOf(activeItem ? activeItem.times : null, n, W, PAD_L, PAD_R);
      function yOf(v) { return PAD_T + (1 - (v - min) / (max - min)) * (H - PAD_T - PAD_B); }

      const lineColor = isLoading ? '#6b7a8d' : (isUp ? '#2bff00' : '#ff1a1a');

      // ── Reference line at open/prev-close ──
      if (openPrice != null) {
        const ry = yOf(openPrice);
        ctx.beginPath();
        ctx.setLineDash([3, 4]);
        ctx.moveTo(PAD_L, ry);
        ctx.lineTo(W - PAD_R, ry);
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // ── Area fill ──
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0,   isLoading?'rgba(107,122,141,0.30)':(isUp?'rgba(43,255,0,0.45)':'rgba(255,26,26,0.45)'));
      grad.addColorStop(0.6, isLoading?'rgba(107,122,141,0.08)':(isUp?'rgba(43,255,0,0.12)':'rgba(255,26,26,0.12)'));
      grad.addColorStop(1,   'rgba(0,0,0,0)');

      ctx.beginPath();
      ctx.moveTo(xOf(0), yOf(prices[0]));
      for (let i = 1; i < n; i++) {
        const xm = (xOf(i-1) + xOf(i)) / 2;
        ctx.bezierCurveTo(xm, yOf(prices[i-1]), xm, yOf(prices[i]), xOf(i), yOf(prices[i]));
      }
      ctx.lineTo(xOf(n-1), H);
      ctx.lineTo(xOf(0),   H);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // ── Line ──
      ctx.beginPath();
      ctx.moveTo(xOf(0), yOf(prices[0]));
      for (let i = 1; i < n; i++) {
        const xm = (xOf(i-1) + xOf(i)) / 2;
        ctx.bezierCurveTo(xm, yOf(prices[i-1]), xm, yOf(prices[i]), xOf(i), yOf(prices[i]));
      }
      ctx.strokeStyle = lineColor;
      ctx.lineWidth   = 1.5;
      ctx.stroke();

      // ── Left gap-fill: solid line at first price if data doesn't start at edge ──
      const _x0 = xOf(0), _y0 = yOf(prices[0]);
      if (_x0 > PAD_L + 3) {
        ctx.beginPath();
        ctx.moveTo(PAD_L, _y0); ctx.lineTo(_x0, _y0);
        ctx.strokeStyle = lineColor; ctx.lineWidth = 1.5; ctx.stroke();
      }

      // ── Hover crosshair ──
      if (hoverIndex !== null) {
        const hx = xOf(hoverIndex);
        const hy = yOf(prices[hoverIndex]);

        // Vertical dashed line
        ctx.beginPath();
        ctx.setLineDash([3, 3]);
        ctx.moveTo(hx, PAD_T);
        ctx.lineTo(hx, H - PAD_B);
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth   = 1;
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.beginPath(); ctx.arc(hx, hy, 3.5, 0, Math.PI*2);
        ctx.fillStyle = lineColor; ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = 1.2; ctx.stroke();

        const timeLabel = (activeItem && activeItem.times && activeItem.times[hoverIndex]) || TIMES[hoverIndex] || '';
        if (timeLabel) {
          ctx.font = '10px Zain, sans-serif';
          const _lw = ctx.measureText(timeLabel).width + 10;
          const _lh = 16;
          let _lx = hx + 3; if (_lx + _lw > W - PAD_R) _lx = hx - _lw - 3;
          const _ly = H - PAD_B - _lh - 1;
          ctx.fillStyle = 'rgba(15,20,30,0.88)'; ctx.beginPath(); ctx.roundRect(_lx,_ly,_lw,_lh,3); ctx.fill();
          ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.textAlign = 'left'; ctx.fillText(timeLabel, _lx+5, _ly+11);
        }
      }
    }

    // ── Header update ───────────────────────────────────────────────────────
    function updateHeader(item, priceVal) {
      const nameEl  = window._commEls.nameEl;
      const priceEl = window._commEls.priceEl;
      const deltaEl = window._commEls.deltaEl;
      const dayOpen = item.open ?? item.prices[0];
      const isUp  = priceVal >= dayOpen;
      const dir   = isUp ? 'up' : 'dn';
      nameEl.textContent  = item.name;
      priceEl.className   = 'commodity-price color-' + dir;
      window.KEYN_DRUM.tick(priceEl, fmtPrice(priceVal));
      deltaEl.className   = 'commodity-delta color-' + dir;
      deltaEl.innerHTML   = (isUp ? TRI_UP : TRI_DN) + '<span>' + fmtDelta(priceVal, dayOpen) + '</span>';
    }

    // ── Canvas hover events ─────────────────────────────────────────────────
    function bindHover(canvas, item) {
      function getIndex(e) {
        const rect = canvas.getBoundingClientRect();
        const x    = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const n    = item.prices.length;
        const PAD_L = 4, PAD_R = 4;
        const W    = rect.width;
        return window.KEYN_CHART.nearestIndex(x, W, PAD_L, PAD_R, item.times, n);
      }

      canvas.onmousemove = function(e) {
        hoverIndex = getIndex(e);
        updateHeader(item, item.prices[hoverIndex]);
        drawChart(canvas, item.prices, item.dir === 'up', item.open ?? item.prices[0], item.loading);
      };
      canvas.onmouseleave = function() {
        hoverIndex = null;
        updateHeader(item, item.prices[item.prices.length - 1]);
        drawChart(canvas, item.prices, item.dir === 'up', item.open ?? item.prices[0], item.loading);
      };
    }

    // ── Render item ─────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function() {
      const tabs         = document.querySelectorAll('#commodity-tabs .commodity-tab');
      const nameEl_      = document.getElementById('commodity-name');
      const priceEl_     = document.getElementById('commodity-price');
      const deltaEl_     = document.getElementById('commodity-delta');
      const canvas       = document.getElementById('commodity-canvas');
      const pill         = document.getElementById('commodity-pill');
      const inactiveDots = document.querySelectorAll('#commodity-progress .carousel-dot-inactive');
      const prevBtn      = document.getElementById('commodity-prev');
      const nextBtn      = document.getElementById('commodity-next');

      // expose to closure
      window._commEls = { nameEl: nameEl_, priceEl: priceEl_, deltaEl: deltaEl_ };

      function renderItem(index) {
        activeItemIndex = index;
        const item = CATEGORIES[activeCategory][index];
        activeItem = item;
        hoverIndex = null;

        const { nameEl, priceEl, deltaEl } = window._commEls;
        nameEl.textContent  = item.name;
        const cur    = item.prices[item.prices.length - 1];
        const dayOpen = item.open ?? item.prices[0];
        const isUp   = cur >= dayOpen;
        priceEl.className   = 'commodity-price color-' + (isUp ? 'up' : 'dn');
        window.KEYN_DRUM.tick(priceEl, fmtPrice(cur));
        deltaEl.className   = 'commodity-delta color-'  + (isUp ? 'up' : 'dn');
        deltaEl.innerHTML   = (isUp ? TRI_UP : TRI_DN) + '<span>' + fmtDelta(cur, dayOpen) + '</span>';

        // Dots
        pill.style.left = PILL_POS[index] + 'px';
        inactiveDots.forEach((dot, i) => { dot.style.left = INACTIVE_POS[index][i] + 'px'; });

        // Draw chart (wait one frame for layout to settle)
        requestAnimationFrame(() => {
          drawChart(canvas, item.prices, isUp, item.open ?? item.prices[0], item.loading);
          bindHover(canvas, item);
        });
      }

      function switchCategory(cat) {
        activeCategory = cat;
        tabs.forEach(t => {
          const match = t.dataset.tab === cat;
          t.classList.toggle('active', match);
          const img = t.querySelector('img');
          img.src = match ? img.dataset.active : img.dataset.inactive;
        });
        renderItem(0);

        // Prefetch live data for this category; re-render active item when done
        prefetchCategory(cat).then(() => {
          // Only re-render if user hasn't switched away
          if (activeCategory === cat) renderItem(activeItemIndex);
        });
      }

      // Expose nameEl/priceEl/deltaEl inside renderItem via closure fix
      Object.assign(window._commEls, {
        nameEl: nameEl_, priceEl: priceEl_, deltaEl: deltaEl_
      });

      tabs.forEach(tab => tab.addEventListener('click', () => switchCategory(tab.dataset.tab)));
      prevBtn.addEventListener('click', () => {
        const len = CATEGORIES[activeCategory].length;
        renderItem((activeItemIndex - 1 + len) % len);
      });
      nextBtn.addEventListener('click', () => {
        const len = CATEGORIES[activeCategory].length;
        renderItem((activeItemIndex + 1) % len);
      });

      // Redraw on resize
      window.addEventListener('resize', () => {
        if (activeItem) drawChart(canvas, activeItem.prices, activeItem.dir === 'up', activeItem.open ?? activeItem.prices[0], activeItem.loading);
      });

      switchCategory('metals');
    });
  })();



  // ── Region picker + live ticker bar ────────────────────────────────────────
  (function() {
    const track      = document.getElementById('ticker-track');
    const activeFlag = document.getElementById('active-flag');
    const picker     = document.getElementById('region-picker');
    const flagWrap   = document.getElementById('flag-wrap');

    let allRegions   = {};
    let activeKey    = 'us';
    let tickerAnim   = null;

    // ── Format helpers ──────────────────────────────────────────────────────
    function fmtPrice(v, currency) {
      if (v == null) return '—';
      if (Math.abs(v) >= 10000) return v.toLocaleString('en-US', {maximumFractionDigits: 0});
      if (Math.abs(v) >= 1000)  return v.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
      if (Math.abs(v) < 10)     return v.toFixed(4);
      return v.toFixed(2);
    }

    function fmtDelta(change, changePct) {
      if (change == null) return '';
      const sign = change >= 0 ? '+' : '';
      return `${sign}${change.toFixed(2)}`;
    }

    function fmtPct(pct) {
      if (pct == null) return '';
      const sign = pct >= 0 ? '+' : '';
      return `${sign}${pct.toFixed(2)}%`;
    }

    // ── Build ticker track from quote data ───────────────────────────────────
    function buildTrack(tickers, quotes) {
      const TRI_UP = '<img src="svg/triangle-up.svg" class="tri-svg-up" alt="up"/>';
      const TRI_DN = '<img src="svg/triangle-down.svg" class="tri-svg-dn" alt="dn"/>';

      function makeCard(t) {
        const q       = quotes[t.symbol] || {};
        const hasData = q.change != null && q.change !== 0;

        const dir     = hasData ? (isUp ? 'up' : 'dn') : 'flat';

  (function() {

    const API_KEY = KEYN_CONFIG.RSS2JSON_KEY;
    const BASE    = 'https://api.rss2json.com/v1/api.json';

    // General financial RSS feeds
    const GENERAL_FEEDS = [
      { url: 'https://feeds.reuters.com/reuters/businessNews',                    name: 'Reuters' },
      { url: 'https://www.cnbc.com/id/100003114/device/rss/rss.html',             name: 'CNBC' },
      { url: 'https://feeds.content.dowjones.io/public/rss/mw_realtimeheadlines', name: 'MarketWatch' },
      { url: 'https://finance.yahoo.com/news/rssindex',                           name: 'Yahoo Finance' },
      { url: 'https://feeds.apnews.com/rss/business',                             name: 'Associated Press' },
      { url: 'https://www.ft.com/rss/home/uk',                                    name: 'Financial Times' },
      { url: 'https://rss.nytimes.com/services/xml/rss/nyt/Business.xml',         name: 'New York Times' },
      { url: 'https://feeds.washingtonpost.com/rss/business',                     name: 'Washington Post' },
    ];

    const newsBody    = document.getElementById('news-body');
    const searchInput = document.getElementById('news-search-input');
    const clearBtn    = document.getElementById('news-bar-clear');

    let allArticles = [];
    let debounce    = null;

    // ── Helpers ───────────────────────────────────────────────────────────────

    function fmtDate(iso) {
      return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function fetchFeed(feedUrl, sourceName, ticker) {
      const url = `${BASE}?rss_url=${encodeURIComponent(feedUrl)}&api_key=${API_KEY}&count=100`;
      return fetch(url)
        .then(r => r.json())
        .then(data => {
          if (data.status !== 'ok') return [];
          return (data.items || []).map(item => ({
            ...item,
            sourceName,
            ticker: ticker || null, // null = general feed
          }));
        })
        .catch(() => []);
    }

    function setLoading() {
      newsBody.innerHTML = `
        <div class="news-status">
          <div class="news-spinner"></div>
          <span>Loading articles…</span>
        </div>`;
    }

    function setError(msg) {
      newsBody.innerHTML = `
        <div class="news-status news-status-error">
          <span class="news-status-icon">⚠</span>
          <span>${msg}</span>
        </div>`;
    }

    function renderArticles(articles, query) {
      if (!articles.length) {
        newsBody.innerHTML = `
          <div class="news-status">
            <span class="news-status-icon">🔍</span>
            <span>No results${query ? ` for "${query}"` : ''}.</span>
          </div>`;
        return;
      }
      newsBody.innerHTML = articles.map(a => {
        const thumb = a.thumbnail
          ? `<img class="news-thumb" src="${a.thumbnail}" alt="" onerror="this.style.display='none'" loading="lazy" />`
          : '';
        const title  = (a.title || '').replace(/ [-|] [^-|]+$/, '').trim();
        const badge  = a.ticker
          ? `<span class="news-ticker-badge">${a.ticker}</span>`
          : '';
        return `
          <div class="news-article" onclick="window.open(${JSON.stringify(a.link)},'_blank')">
            ${thumb}
            <div class="news-text">
              <span class="news-headline">${title}</span>
              <div class="news-meta">
                ${badge}
                <span class="news-source-label">${a.sourceName}</span>
                <span class="news-date">${fmtDate(a.pubDate)}</span>
                <a class="news-read" href="${a.link}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">Read →</a>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    function applySearch(query) {
      if (!query) { renderArticles(allArticles, null); return; }
      const q       = query.replace(/^\$/, '').toLowerCase();
      const matched = allArticles.filter(a =>
        (a.title       || '').toLowerCase().includes(q) ||
        (a.description || '').toLowerCase().includes(q) ||
        (a.ticker      || '').toLowerCase() === q
      );
      renderArticles(matched, query);
    }

    // ── Loader — general feeds + one per shortlist ticker ────────────────────

    async function loadFeeds() {
      setLoading();

      // Build ticker feeds from shortlist (read from global set by shortlist IIFE)
      const shortlist   = window.KEYN_SHORTLIST || [];
      const tickerFeeds = shortlist.map(s => ({
        url:    `https://finance.yahoo.com/rss/headline?s=${s.ticker}`,
        name:   `Yahoo Finance`,
        ticker: s.ticker,
      }));

      // Fire all requests in parallel
      const allFeeds = [
        ...GENERAL_FEEDS.map(f => fetchFeed(f.url, f.name, null)),
        ...tickerFeeds.map(f  => fetchFeed(f.url, f.name, f.ticker)),
      ];

      const results = await Promise.allSettled(allFeeds);

      const seen = new Set();
      allArticles = results
        .filter(r  => r.status === 'fulfilled')
        .flatMap(r => r.value)
        .filter(a  => {
          if (seen.has(a.link)) return false;
          seen.add(a.link);
          return true;
        })
        .sort((a, b) => {
          // Ticker articles always above general, then newest first within each group
          if (a.ticker && !b.ticker) return -1;
          if (!a.ticker && b.ticker) return  1;
          return new Date(b.pubDate) - new Date(a.pubDate);
        });

      if (!allArticles.length) {
        setError('Could not load any feeds — check your rss2json key.');
        return;
      }

      applySearch(searchInput.value.trim() || null);
    }

    // ── Search input ──────────────────────────────────────────────────────────

    clearBtn.style.display = 'none';

    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim();
      clearBtn.style.display = q ? 'flex' : 'none';
      clearTimeout(debounce);
      debounce = setTimeout(() => applySearch(q || null), 200);
    });

    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      clearBtn.style.display = 'none';
      searchInput.focus();
      applySearch(null);
    });

    // ── Init ──────────────────────────────────────────────────────────────────
    loadFeeds();

  })();

  // ── Portfolio Chart ──────────────────────────────────────────────────────
  (function() {

    let positions = [];
    try { positions = JSON.parse(localStorage.getItem('keyn_portfolio') || '[]'); } catch(e) {}

    const canvas    = document.getElementById('portfolio-canvas');
    const valueEl   = document.getElementById('port-value');
    const deltaEl   = document.getElementById('port-delta');
    const deltaText = document.getElementById('port-delta-text');
    const tabs      = document.querySelectorAll('#portfolio-time-tabs .time-tab');

    let activeRange = '1D';
    let _portVals   = [];
    let _portTimes  = [];
    let _chartXOf   = null;

    const RANGE_PARAMS = {
      '1D':  { interval: '5m',  range: '1d'  },
      '1W':  { interval: '60m', range: '5d'  },
      '1M':  { interval: '1d',  range: '1mo' },
      'YTD': { interval: '1d',  range: 'ytd' },
      '1Y':  { interval: '1d',  range: '1y'  },
      'ALL': { interval: '1wk', range: 'max' },
    };
    const rangeCache = {};
    window._keynHomeRangeCache = rangeCache; // exposed for stocks panel

    function getRangeData(p) {
      return rangeCache[`${p.ticker}:${activeRange}`] || { prices: p.prices || [], times: p.times || [] };
    }

    function formatTimeLabel(ts, range, tz) {
      const d = new Date(ts * 1000), opt = { timeZone: tz };
      if (range === '1D')
        return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false, ...opt });
      if (range === '1W' || range === '1M') {
        const dp = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', ...opt });
        const tp = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false, ...opt });
        return `${dp} · ${tp}`;
      }
      if (range === 'YTD')
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', ...opt });
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', ...opt });
    }

    function fmtVal(v) {
      return '$' + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function updateHeader(vals) {
      if (!vals.length) return;
      const cur  = vals[vals.length - 1];
      const costBasis  = positions.reduce((s, p) => s + p.avgPrice * p.shares, 0);
      const prevClose  = positions.reduce((s, p) => {
        const pc = p.prevClose != null ? p.prevClose : (p.currentPrice || p.avgPrice) - (p.change || 0);
        return s + pc * p.shares;
      }, 0);
      const refVal = activeRange === '1D' ? prevClose : activeRange === 'ALL' ? costBasis : vals[0];
      const abs  = cur - refVal;
      const pct  = refVal > 0 ? (abs / refVal) * 100 : 0;
      const isUp = abs >= 0;
      window.KEYN_DRUM.tick(valueEl, fmtVal(cur));
      deltaEl.className = 'portfolio-delta ' + (isUp ? 'color-up' : 'color-dn');
      const sign = isUp ? '+' : '-';
      deltaText.textContent = sign + '$' + Math.abs(abs).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) +
                              ' (' + Math.abs(pct).toFixed(2) + '%)';
    }

    function drawChart(hoverIdx = null) {
      const wrap = canvas.parentElement;
      const W = wrap.offsetWidth, H = wrap.offsetHeight;
      if (!W || !H) return;

      canvas.width  = W * devicePixelRatio;
      canvas.height = H * devicePixelRatio;
      canvas.style.width  = W + 'px';
      canvas.style.height = H + 'px';

      const ctx = canvas.getContext('2d');
      ctx.scale(devicePixelRatio, devicePixelRatio);

      let maxLen = 0, longestTimes = [];
      positions.forEach(p => {
        const { prices, times } = getRangeData(p);
        if (prices.length > maxLen) { maxLen = prices.length; longestTimes = times; }
      });
      if (maxLen < 2) return;
      _portTimes = longestTimes;

      const vals = [];
      for (let i = 0; i < maxLen; i++) {
        let total = 0;
        positions.forEach(p => {
          const { prices } = getRangeData(p);
          total += prices[Math.min(i, prices.length - 1)] * p.shares;
        });
        vals.push(total);
      }
      _portVals = vals;

      const n         = vals.length;
      const costBasis = positions.reduce((s, p) => s + p.avgPrice * p.shares, 0);
      const prevClose = positions.reduce((s, p) => {
        const pc = p.prevClose != null ? p.prevClose : (p.currentPrice || p.avgPrice) - (p.change || 0);
        return s + pc * p.shares;
      }, 0);
      const refVal = activeRange === '1D' ? prevClose : activeRange === 'ALL' ? costBasis : vals[0];

      const allV   = [...vals, refVal];
      const lo     = Math.min(...allV);
      const hi     = Math.max(...allV);
      const spread = Math.max(hi - lo, hi * 0.0008);
      const minV   = lo - spread * 0.2;
      const maxV   = hi + spread * 0.2;
      const PL = 12, PR = 12, PT = 16, PB = 12;
      const isUp = vals[n - 1] >= refVal;

      const xOf = i => PL + (n > 1 ? i / (n - 1) : 0) * (W - PL - PR);
      const yOf = v => PT + (1 - (v - minV) / (maxV - minV)) * (H - PT - PB);
      _chartXOf = xOf;

      // Reference dashed line
      ctx.save();
      ctx.setLineDash([4, 6]);
      ctx.beginPath(); ctx.moveTo(PL, yOf(refVal)); ctx.lineTo(W - PR, yOf(refVal));
      ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1; ctx.stroke();
      ctx.restore();

      // Gradient fill
      const fillGrad = ctx.createLinearGradient(0, 0, 0, H);
      fillGrad.addColorStop(0,    isUp ? 'rgba(43,255,0,0.35)' : 'rgba(255,26,26,0.35)');
      fillGrad.addColorStop(0.55, isUp ? 'rgba(43,255,0,0.08)' : 'rgba(255,26,26,0.08)');
      fillGrad.addColorStop(1,    'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.moveTo(xOf(0), yOf(vals[0]));
      for (let i = 1; i < n; i++) {
        const m = (xOf(i-1)+xOf(i))/2;
        ctx.bezierCurveTo(m, yOf(vals[i-1]), m, yOf(vals[i]), xOf(i), yOf(vals[i]));
      }
      ctx.lineTo(xOf(n-1), H); ctx.lineTo(PL, H); ctx.closePath();
      ctx.fillStyle = fillGrad; ctx.fill();

      // Line
      const lineColor = isUp ? '#2bff00' : '#ff1a1a';
      ctx.beginPath(); ctx.moveTo(xOf(0), yOf(vals[0]));
      for (let i = 1; i < n; i++) {
        const m = (xOf(i-1)+xOf(i))/2;
        ctx.bezierCurveTo(m, yOf(vals[i-1]), m, yOf(vals[i]), xOf(i), yOf(vals[i]));
      }
      ctx.strokeStyle = lineColor; ctx.lineWidth = 2; ctx.stroke();

      // Dot / hover
      if (hoverIdx !== null) {
        const hx = xOf(hoverIdx), hy = yOf(vals[hoverIdx]);
        ctx.save(); ctx.setLineDash([3, 5]);
        ctx.beginPath(); ctx.moveTo(hx, PT); ctx.lineTo(hx, H - PB);
        ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1; ctx.stroke();
        ctx.restore();
        ctx.beginPath(); ctx.arc(hx, hy, 5, 0, Math.PI * 2); ctx.fillStyle = lineColor; ctx.fill();
        ctx.beginPath(); ctx.arc(hx, hy, 3, 0, Math.PI * 2); ctx.fillStyle = '#0d0d17'; ctx.fill();
        const lbl = _portTimes[hoverIdx] || '';
        if (lbl) {
          ctx.font = 'bold 11px Zain, sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
          const lx = Math.max(28, Math.min(W - 28, hx));
          const tw = ctx.measureText(lbl).width;
          ctx.fillStyle = 'rgba(32,41,49,0.85)';
          ctx.beginPath(); ctx.roundRect(lx - tw/2 - 6, H - PB - 18, tw + 12, 16, 4); ctx.fill();
          ctx.fillStyle = 'rgba(255,255,255,0.55)';
          ctx.fillText(lbl, lx, H - PB - 3);
        }
      } else {
        ctx.beginPath(); ctx.arc(xOf(n-1), yOf(vals[n-1]), 4, 0, Math.PI * 2);
        ctx.fillStyle = lineColor; ctx.fill();
      }

      updateHeader(vals);
    }

    async function fetchAndDraw(range) {
      if (!positions.length) return;
      const params = RANGE_PARAMS[range];
      canvas.style.cursor = 'wait';

      await Promise.allSettled(positions.map(async p => {
        const key = `${p.ticker}:${range}`;
        if (rangeCache[key]) return;
        try {
          const resp = await fetch(`/api/chart?symbol=${encodeURIComponent(p.ticker)}&interval=${params.interval}&range=${params.range}`);
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const result = (await resp.json())?.chart?.result?.[0];
          if (!result) return;
          const rawTS    = result.timestamp || [];
          const rawClose = result.indicators?.quote?.[0]?.close || [];
          const tz       = result.meta?.exchangeTimezoneName || 'America/New_York';
          // Also grab prevClose from chart meta for accurate 1D reference
          if (range === '1D') {
            const pc = result.meta?.regularMarketPreviousClose || result.meta?.chartPreviousClose;
            if (pc) p.prevClose = pc; // always overwrite with fresh value
          }
          let pairs = rawTS.map((ts, i) => ({ ts, price: rawClose[i] })).filter(pt => pt.price != null);
          if (range === 'ALL' && p.purchaseDate) {
            const pts = new Date(p.purchaseDate).getTime() / 1000;
            const f   = pairs.filter(pt => pt.ts >= pts - 86400);
            if (f.length >= 2) pairs = f;
          }
          rangeCache[key] = {
            prices: pairs.map(pt => pt.price),
            times:  pairs.map(pt => formatTimeLabel(pt.ts, range, tz)),
          };
        } catch(e) { console.warn('[KEYN home] chart fetch failed:', e.message); }
      }));

      canvas.style.cursor = 'crosshair';
      drawChart();
      window.dispatchEvent(new CustomEvent('keyn-range-change', { detail: range }));
    }

    // Hover
    canvas.addEventListener('mousemove', e => {
      if (!_portVals.length || !_chartXOf) return;
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      let best = 0, bestD = Infinity;
      for (let i = 0; i < _portVals.length; i++) {
        const d = Math.abs(_chartXOf(i) - mx);
        if (d < bestD) { bestD = d; best = i; }
      }
      drawChart(best);
      window.KEYN_DRUM.tick(valueEl, fmtVal(_portVals[best]));
    });
    canvas.addEventListener('mouseleave', () => {
      if (_portVals.length) drawChart();
    });

    // Range tabs
    tabs.forEach(tab => tab.addEventListener('click', () => {
      activeRange = tab.dataset.range;
      tabs.forEach(t => t.classList.toggle('active', t.dataset.range === activeRange));
      fetchAndDraw(activeRange);
    }));

    window.addEventListener('resize', () => { if (_portVals.length) drawChart(); });

    // ResizeObserver fires as soon as the container has real layout dimensions
    const _portRO = new ResizeObserver(entries => {
      for (const e of entries) {
        if (e.contentRect.width > 0 && e.contentRect.height > 0) {
          drawChart();
        }
      }
    });
    _portRO.observe(canvas.parentElement);

    // Bootstrap: fetch 1D data immediately
    fetchAndDraw('1D');

  })();

      { ticker:'SOFI', shares:'286 shares',  pct:'+5.53%', dir:'up', prices:[10,11,10,12,13,12,14,15,14,16,15,17,16,18] },
      { ticker:'ARKK', shares:'10 shares',   pct:'-1.49%', dir:'dn', prices:[65,63,64,61,60,62,59,57,58,55,56,53,54,52] },
      { ticker:'PYPL', shares:'1.4K shares', pct:'+2.42%', dir:'up', prices:[78,79,78,81,83,82,84,86,85,87,86,89,88,91] },
      { ticker:'SE',   shares:'80 shares',   pct:'-0.13%', dir:'dn', prices:[55,54,55,53,52,54,51,50,52,49,50,48,49,47] },
      { ticker:'AMZN', shares:'35 shares',   pct:'+1.67%', dir:'up', prices:[180,182,181,184,186,185,188,190,189,192,191,194,193,196] },
    ];

    // Build display rows for a given range
    function buildStockRows(range) {
      if (!_positions.length) return DEMO_STOCKS;
      return _positions.map(p => {
        let pct, dir, prices, refPrice = null;
        const sharesLabel = p.shares >= 1000
          ? (p.shares / 1000).toFixed(1).replace(/\.0$/, '') + 'K shares'
          : p.shares + ' shares';

        const rangeData = (window._keynPosRangeData || {})[range];
        const posData   = rangeData && rangeData[p.ticker];

        if (range === '1D') {
          // Use fresh 1D prices from home portfolio chart's rangeCache if available
          const cached1D = (window._keynHomeRangeCache || {})[`${p.ticker}:1D`];
          if (cached1D && cached1D.prices.length >= 2) {
            const freshPrices = cached1D.prices;
            const prevClose   = p.prevClose != null ? p.prevClose : (p.currentPrice - (p.change || 0));
            const lastPrice   = freshPrices[freshPrices.length - 1];
            const pctVal      = prevClose > 0 ? ((lastPrice - prevClose) / prevClose) * 100 : 0;
            pct    = (pctVal >= 0 ? '+' : '') + pctVal.toFixed(2) + '%';
            dir    = pctVal >= 0 ? 'up' : 'dn';
            prices = freshPrices;
            refPrice = prevClose;
          } else {
            // Fall back to stored changePct — use prevClose for direction too
            const prevClose = p.prevClose != null ? p.prevClose : (p.currentPrice - (p.change || 0));
            const lastPrice = (p.prices && p.prices.length) ? p.prices[p.prices.length - 1] : p.currentPrice;
            const pct1D    = prevClose > 0 ? ((lastPrice - prevClose) / prevClose) * 100 : (p.changePct || 0);
            pct    = (pct1D >= 0 ? '+' : '') + pct1D.toFixed(2) + '%';
            dir    = pct1D >= 0 ? 'up' : 'dn';
            prices = p.prices || [];
            refPrice = prevClose;
          }
        } else {
          // Other range: use fetched per-position prices
          const pairs = posData.pairs || [];
          const pPrices = pairs.map(pt => pt.price);
          const open    = pPrices[0], close = pPrices[pPrices.length - 1];
          const pctVal  = open > 0 ? ((close - open) / open) * 100 : 0;
          pct    = (pctVal >= 0 ? '+' : '') + pctVal.toFixed(2) + '%';
          dir    = pctVal >= 0 ? 'up' : 'dn';
          prices = pPrices;
        }

        return { ticker: p.ticker, shares: sharesLabel, pct, dir, prices, refPrice, currentPrice: p.currentPrice };
      });
    }

    const btn      = document.getElementById('portfolio-btn');
    const btnIcon  = document.getElementById('portfolio-btn-icon');
    const panel    = document.getElementById('stocks-panel');
    const content  = document.getElementById('stocks-content');
    const closeBtn = document.getElementById('stocks-panel-close');
    const listEl   = document.getElementById('stocks-panel-list');
    let expanded   = false;
    let currentRange = '1D';

    function drawSparkline(canvas, prices, dir, refPrice) {
      if (!prices || prices.length < 2) return;

      const DPR  = window.devicePixelRatio || 1;
      const cssW = canvas.offsetWidth  || 110;
      const cssH = canvas.offsetHeight || 40;

      canvas.width  = cssW * DPR;
      canvas.height = cssH * DPR;
      canvas.style.width  = cssW + 'px';
      canvas.style.height = cssH + 'px';

      const ctx = canvas.getContext('2d');
      ctx.scale(DPR, DPR);

      const W = cssW, H = cssH;
      const n    = prices.length;
      const ref  = refPrice != null ? refPrice : prices[0];
      const last = prices[n - 1];
      const isUp = last >= ref;

      const allV = [...prices, ref];
      const lo   = Math.min(...allV);
      const hi   = Math.max(...allV);
      const span = Math.max(hi - lo, 0.01);
      const pad  = span * 0.2;
      const minV = lo - pad, maxV = hi + pad;

      // Snap to half-pixel for crisp 1px lines
      const xOf = i => Math.round((i / (n - 1)) * W * 2) / 2;
      const yOf = v => Math.round((H - ((v - minV) / (maxV - minV)) * H) * 2) / 2;

      const lineColor = isUp ? '#0a7a00' : '#cc1010';

      // Reference dashed line
      ctx.save();
      ctx.setLineDash([4, 5]);
      ctx.beginPath();
      ctx.moveTo(0, yOf(ref)); ctx.lineTo(W, yOf(ref));
      ctx.strokeStyle = 'rgba(0,0,0,0.25)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();

      // Fill
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0,   isUp ? 'rgba(10,122,0,0.4)'  : 'rgba(204,16,16,0.4)');
      grad.addColorStop(1,   isUp ? 'rgba(10,122,0,0)'    : 'rgba(204,16,16,0)');
      ctx.beginPath();
      ctx.moveTo(xOf(0), yOf(prices[0]));
      for (let i = 1; i < n; i++) ctx.lineTo(xOf(i), yOf(prices[i]));
      ctx.lineTo(xOf(n - 1), H);
      ctx.lineTo(xOf(0), H);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // Line — straight segments, 1.5px
      ctx.beginPath();
      ctx.moveTo(xOf(0), yOf(prices[0]));
      for (let i = 1; i < n; i++) ctx.lineTo(xOf(i), yOf(prices[i]));
      ctx.strokeStyle = lineColor;
      ctx.lineWidth   = 1.5;
      ctx.lineJoin    = 'round';
      ctx.lineCap     = 'round';
      ctx.stroke();
    }

    // Cache for sparkline fetches so we don't refetch on every panel open
    const _sparkCache = {};

    async function buildStocksPanel() {
      listEl.innerHTML = '';
      const stockRows = buildStockRows(currentRange);

      // Render rows immediately with structure (no chart yet)
      const canvasMap = {};
      stockRows.forEach(s => {
        const row = document.createElement('div');
        row.className = 'sp-row';
        row.innerHTML = `<div class="sp-info"><span class="sp-ticker">${s.ticker}</span><span class="sp-shares">${s.shares}</span></div><canvas class="sp-canvas"></canvas><div class="sp-right"><span class="sp-price">${s.currentPrice ? '$' + s.currentPrice.toFixed(2) : ''}</span><span class="sp-pct ${s.dir==='up'?'color-up':'color-dn'}">${s.pct}</span></div>`;
        listEl.appendChild(row);
        canvasMap[s.ticker] = { canvas: row.querySelector('canvas'), s };
      });

      // Fetch 30m interval (gives ~13 clean points for 1D — perfect for sparkline size)
      await Promise.allSettled(stockRows.map(async s => {
        try {
          if (!_sparkCache[s.ticker]) {
            const resp = await fetch(`/api/chart?symbol=${encodeURIComponent(s.ticker)}&interval=30m&range=1d`);
            if (!resp.ok) return;
            const result = (await resp.json())?.chart?.result?.[0];
            if (!result) return;
            const rawTS    = result.timestamp || [];
            const rawClose = result.indicators?.quote?.[0]?.close || [];
            const pc       = result.meta?.regularMarketPreviousClose;
            const prices   = rawTS
              .map((ts, i) => ({ ts, price: rawClose[i] }))
              .filter(pt => pt.price != null)
              .map(pt => pt.price);
            if (prices.length >= 2) _sparkCache[s.ticker] = { prices, prevClose: pc };
          }
        } catch(e) {}
      }));

      // Draw all sparklines now that data is ready
      requestAnimationFrame(() => {
        stockRows.forEach(s => {
          const entry = canvasMap[s.ticker];
          if (!entry) return;
          const cached = _sparkCache[s.ticker];
          const prices  = (cached && cached.prices.length >= 2) ? cached.prices : s.prices;
          const refPrice = (cached && cached.prevClose) ? cached.prevClose : s.refPrice;
          drawSparkline(entry.canvas, prices, s.dir, refPrice);
        });
      });
    }

    // Clear sparkline cache when range changes so it refetches
    window.addEventListener('keyn-range-change', e => {
      currentRange = e.detail;
      Object.keys(_sparkCache).forEach(k => delete _sparkCache[k]);
      if (expanded) buildStocksPanel();
    });

    // ── Shortlist ─────────────────────────────────────────────────────────
    const SL_DATA = window.KEYN_SHORTLIST;

    const slRows    = document.getElementById('sl-rows');
    const slFilters = document.querySelectorAll('#sl-filters .sl-filter');
    const slPeriods = document.querySelectorAll('#sl-period-tabs .sl-period');
    let slFilter    = 'all';
    let slPeriod    = '1D';

    function slDrawSpark(canvas, prices, dir) {
      const DPR = window.devicePixelRatio || 1;
      const W = canvas.width / DPR, H = canvas.height / DPR;
      const ctx = canvas.getContext('2d');
      ctx.scale(DPR, DPR);
      const n = prices.length;
      const min = Math.min(...prices) * 0.98, max = Math.max(...prices) * 1.02;
      const lineColor = dir === 'up' ? '#189400' : dir === 'dn' ? '#A80D0D' : '#888';
      function x(i) { return (i / (n-1)) * W; }
      function y(v) { return H - ((v - min) / (max - min)) * H; }
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      if (dir === 'up') { grad.addColorStop(0, 'rgba(43,255,0,0.35)'); grad.addColorStop(1, 'rgba(43,255,0,0)'); }
      else if (dir === 'dn') { grad.addColorStop(0, 'rgba(255,26,26,0.35)'); grad.addColorStop(1, 'rgba(255,26,26,0)'); }
      else { grad.addColorStop(0, 'rgba(150,150,150,0.3)'); grad.addColorStop(1, 'rgba(150,150,150,0)'); }
      ctx.beginPath(); ctx.moveTo(x(0), y(prices[0]));
      for (let i = 1; i < n; i++) { const mx = (x(i-1)+x(i))/2; ctx.bezierCurveTo(mx,y(prices[i-1]),mx,y(prices[i]),x(i),y(prices[i])); }
      ctx.lineTo(x(n-1), H); ctx.lineTo(0, H); ctx.closePath();
      ctx.fillStyle = grad; ctx.fill();
      ctx.beginPath(); ctx.moveTo(x(0), y(prices[0]));
      for (let i = 1; i < n; i++) { const mx = (x(i-1)+x(i))/2; ctx.bezierCurveTo(mx,y(prices[i-1]),mx,y(prices[i]),x(i),y(prices[i])); }
      ctx.strokeStyle = lineColor; ctx.lineWidth = 1.5; ctx.stroke();
    }

    function renderShortlist() {
      slRows.innerHTML = '';
      const visible = SL_DATA.filter(s => slFilter === 'all' || s.type === slFilter);
      visible.forEach(s => {
        const dir = s.dir[slPeriod];
        const pct = s.pct[slPeriod];
        const row = document.createElement('div');
        row.className = 'sl-row';
        const DPR = window.devicePixelRatio || 1;
        row.innerHTML = `
          <span class="sl-ticker">${s.ticker}</span>
          <canvas class="sl-canvas" width="${116*DPR}" height="${34*DPR}"></canvas>
          <span class="sl-pct ${dir === 'up' ? 'sl-up' : dir === 'dn' ? 'sl-dn' : 'sl-flat'}">${pct}</span>
        `;
        slRows.appendChild(row);
        slDrawSpark(row.querySelector('canvas'), s.prices, dir);
      });
    }

    slFilters.forEach(btn => {
      btn.addEventListener('click', () => {
        slFilters.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        slFilter = btn.dataset.filter;
        renderShortlist();
      });
    });
    slPeriods.forEach(tab => {
      tab.addEventListener('click', () => {
        slPeriods.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        slPeriod = tab.dataset.period;
        renderShortlist();
      });
    });

    renderShortlist();

    function openPanel() {
      expanded = true;
      buildStocksPanel();
      panel.classList.add('open');
      content.classList.add('visible');
      btnIcon.src = 'svg/Close-Icon.svg';
    }

    function closePanel() {
      expanded = false;
      panel.classList.remove('open');
      content.classList.remove('visible');
      btnIcon.src = 'svg/Open-Icon.svg';
    }

    btn.addEventListener('click', () => expanded ? closePanel() : openPanel());
    closeBtn.addEventListener('click', closePanel);
  })();
</script>
<script src="partials/keyn-partials.js"></script>
<script>KEYN.initPage('dashboard');</script>
</body>
